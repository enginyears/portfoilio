<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>enginyears | Electronics & Maker Projects</title>

  <!-- ─── SEO & Social Sharing ─────────────────────────────────────────── -->
  <meta name="description" content="Electronics, DIY, ESP32, Raspberry Pi, Home Automation and maker projects by enginyears." />
  <meta property="og:title" content="enginyears" />
  <meta property="og:description" content="Electronics • DIY • Maker Projects" />
  <meta property="og:image" content="" /><!-- Put your og-image URL here -->
  <meta property="og:url" content="https://yourusername.github.io" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- ─── GoatCounter Analytics ────────────────────────────────────────── -->

    GoatCounter automatically tracks: page views, referrers, countries, devices.

  <!-- ─── PapaParse — CSV parser (loads projects.csv at runtime) ──────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <!-- ─── Google Fonts ─────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Unbounded:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ═══════════════════════════════════════════════════════════════════
       DESIGN SYSTEM — PCB / Circuit Board Aesthetic
       ═══════════════════════════════════════════════════════════════════ */
    :root {
      --bg:         #060a0d;
      --surface:    #0c1318;
      --surface2:   #121c23;
      --surface3:   #1a2632;
      --border:     #1e2f3d;
      --border2:    #243545;
      --accent:     #00e5a0;   /* electric green — soldermask */
      --accent2:    #00b4d8;   /* cyan — oscilloscope trace */
      --accent3:    #ff6b35;   /* orange — warning LED */
      --text:       #d8e8f0;
      --muted:      #637d8f;
      --dim:        #3d5568;
      --radius:     10px;
      --radius-lg:  18px;
      --mono:       'Space Mono', monospace;
      --display:    'Unbounded', sans-serif;
      --body:       'DM Sans', sans-serif;
    }

    /* ─── Reset ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--body);
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ─── Circuit Board SVG Background ───────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        /* Horizontal traces */
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 39px,
          rgba(0, 229, 160, 0.03) 39px,
          rgba(0, 229, 160, 0.03) 40px
        ),
        /* Vertical traces */
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 39px,
          rgba(0, 180, 216, 0.025) 39px,
          rgba(0, 180, 216, 0.025) 40px
        );
      background-size: 40px 40px;
    }

    /* Vignette overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, transparent 0%, rgba(6,10,13,0.7) 100%);
    }

    /* Scan line effect */
    @keyframes scan {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(transparent, rgba(0,229,160,0.04), transparent);
      animation: scan 8s linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    /* ─── Layout Container ───────────────────────────────────────────── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 2;
    }

    /* ─── Top Nav ─────────────────────────────────────────────────────── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-decoration: none;
    }
    .nav-logo span { color: var(--muted); }
    .nav-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 2s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ─── Hero Section ────────────────────────────────────────────────── */
    .hero {
      padding: 52px 0 40px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 36px;
      align-items: center;
    }
    @media (max-width: 640px) {
      .hero { grid-template-columns: 1fr; text-align: center; }
    }

    /* Hexagonal avatar */
    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .avatar-hex {
      width: 120px;
      height: 120px;
      clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
      background: var(--surface2);
      overflow: hidden;
      position: relative;
    }
    .avatar-hex img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .avatar-hex .avatar-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      background: linear-gradient(135deg, var(--surface2), var(--surface3));
    }
    /* Glowing border ring */
    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
      background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent));
      z-index: -1;
      animation: rotateBorder 4s linear infinite;
    }
    @keyframes rotateBorder {
      to { filter: hue-rotate(360deg); }
    }

    .hero-info { display: flex; flex-direction: column; gap: 10px; }
    .hero-name {
      font-family: var(--display);
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: #fff;
    }
    .hero-name .cursor {
      display: inline-block;
      width: 3px;
      height: 0.85em;
      background: var(--accent);
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    .hero-tagline {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .hero-bio {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.65;
      max-width: 540px;
    }

    /* Social buttons row */
    .social-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }
    @media (max-width: 640px) { .social-row { justify-content: center; } }

    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border-radius: 100px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text);
      transition: all 0.2s ease;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    .social-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .social-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,229,160,0.15); }
    .social-btn.insta:hover { border-color: #e1306c; color: #e1306c; box-shadow: 0 4px 20px rgba(225,48,108,0.2); }
    .social-btn.yt:hover { border-color: #ff0000; color: #ff0000; box-shadow: 0 4px 20px rgba(255,0,0,0.2); }

    /* ─── Quick Stats Strip ───────────────────────────────────────────── */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin: 32px 0;
    }
    .stat-cell {
      background: var(--surface);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-value {
      font-family: var(--display);
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ─── Section Header ─────────────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 14px;
    }
    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::before {
      content: '';
      display: block;
      width: 20px;
      height: 2px;
      background: var(--accent);
    }

    /* ─── Search Bar ─────────────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      max-width: 280px;
      width: 100%;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 9px 14px 9px 36px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--dim); }
    .search-input:focus { border-color: var(--accent); }

    /* ─── Filter Tabs ─────────────────────────────────────────────────── */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 100px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      transition: all 0.2s ease;
    }
    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* ─── Project Grid ────────────────────────────────────────────────── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    /* ─── Project Card ────────────────────────────────────────────────── */
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: default;
    }
    .project-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,229,160,0.1), 0 0 0 1px rgba(0,229,160,0.1);
    }

    /* Featured card gets full-width treatment */
    .project-card.featured {
      grid-column: 1 / -1;
      flex-direction: row;
    }
    @media (max-width: 640px) {
      .project-card.featured { flex-direction: column; }
    }
    .project-card.featured .card-thumb { width: 340px; flex-shrink: 0; }
    @media (max-width: 640px) {
      .project-card.featured .card-thumb { width: 100%; }
    }

    /* Thumbnail */
    .card-thumb {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--surface2);
      overflow: hidden;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .project-card:hover .card-thumb img { transform: scale(1.04); }

    /* Thumbnail placeholder */
    .thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      background: linear-gradient(135deg, var(--surface2), var(--surface3));
      color: var(--dim);
    }

    /* Stats overlay on thumb hover */
    .thumb-stats {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(6,10,13,0.9));
      padding: 28px 12px 10px;
      display: flex;
      gap: 12px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .project-card:hover .thumb-stats { transform: translateY(0); }
    .thumb-stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(255,255,255,0.7);
    }

    /* Badges on thumbnail */
    .card-badges {
      position: absolute;
      top: 10px; left: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .badge-new { background: var(--accent3); color: #fff; }
    .badge-featured { background: var(--accent); color: #000; }

    /* Difficulty indicator top-right of thumb */
    .diff-badge {
      position: absolute;
      top: 10px; right: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      backdrop-filter: blur(8px);
    }
    .diff-beginner     { background: rgba(0,229,160,0.2); color: var(--accent); border: 1px solid rgba(0,229,160,0.3); }
    .diff-intermediate { background: rgba(0,180,216,0.2); color: var(--accent2); border: 1px solid rgba(0,180,216,0.3); }
    .diff-advanced     { background: rgba(255,107,53,0.2); color: var(--accent3); border: 1px solid rgba(255,107,53,0.3); }

    /* Card body */
    .card-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    /* Tags */
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      padding: 3px 8px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 10px;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .card-title {
      font-family: var(--display);
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }
    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    /* Component chips */
    .components-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .component-chip {
      padding: 2px 7px;
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 9px;
      background: transparent;
      color: var(--accent2);
      border: 1px solid rgba(0,180,216,0.25);
    }

    /* Date */
    .card-date {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
    }

    /* Action buttons */
    .card-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 18px 18px;
    }
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 6px;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      transition: all 0.2s ease;
      cursor: pointer;
      text-transform: uppercase;
    }
    .action-btn svg { width: 16px; height: 16px; }
    .action-btn:hover { transform: translateY(-2px); }
    .action-btn.insta:hover  { color: #e1306c; border-color: #e1306c; background: rgba(225,48,108,0.08); }
    .action-btn.yt:hover     { color: #ff0000; border-color: #ff0000; background: rgba(255,0,0,0.08); }
    .action-btn.gh:hover     { color: var(--accent); border-color: var(--accent); background: rgba(0,229,160,0.08); }
    .action-btn.disabled     { opacity: 0.25; pointer-events: none; }

    /* ─── Empty State ─────────────────────────────────────────────────── */
    .empty-state {
      grid-column: 1/-1;
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }
    .empty-state span { font-size: 32px; display: block; margin-bottom: 12px; }

    /* ─── Footer ──────────────────────────────────────────────────────── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
    }
    .footer-left {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }
    .footer-left a { color: var(--muted); text-decoration: none; }
    .footer-left a:hover { color: var(--accent); }
    .footer-right {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .footer-right::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ─── Toast Notification ─────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface3);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 20px;
      border-radius: 100px;
      z-index: 9999;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── Scroll reveal ───────────────────────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="scanline"></div>

  <div class="container">

    <!-- ─── Nav ────────────────────────────────────────────────────────── -->
    <nav class="nav">
      <a class="nav-logo" href="#">
        <span>./</span>enginyears
      </a>
      <div class="nav-status">
        <div class="status-dot"></div>
        <span id="visitor-label">loading...</span>
      </div>
    </nav>

    <!-- ─── Hero ────────────────────────────────────────────────────────── -->
    <section class="hero reveal" id="hero-section">
      <!-- Avatar injected by JS -->
      <div id="avatar-slot"></div>
      <div class="hero-info">
        <div class="hero-tagline" id="hero-tagline"></div>
        <h1 class="hero-name" id="hero-name">
          <!-- name + cursor -->
        </h1>
        <p class="hero-bio" id="hero-bio"></p>
        <div class="social-row" id="social-row"></div>
      </div>
    </section>

    <!-- ─── Stats Strip ──────────────────────────────────────────────────── -->
    <div class="stats-strip reveal" id="stats-strip"></div>

    <!-- ─── Projects ─────────────────────────────────────────────────────── -->
    <div class="section-header reveal">
      <div class="section-title">Projects</div>
      <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <div class="search-wrap">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="search-input" id="search-input" type="text" placeholder="search projects..." />
        </div>
      </div>
    </div>

    <div class="filter-row reveal" id="filter-row"></div>
    <div class="projects-grid" id="projects-grid"></div>

    <!-- ─── Footer ──────────────────────────────────────────────────────── -->
    <footer class="footer">
      <div class="footer-left">
        Built with ♥ by <a id="footer-name" href="#"></a>
        &nbsp;·&nbsp;
        <a id="footer-gh" href="#">GitHub</a>
      </div>
      <div class="footer-right" id="footer-right">
        <!-- analytics note injected by JS -->
      </div>
    </footer>

  </div><!-- /container -->

  <!-- Toast -->
  <div class="toast" id="toast"></div>


  <!-- ═══════════════════════════════════════════════════════════════════════
       ████████  DATABASE & CONFIG  ████████
       Edit everything below this line to update your page.
       ═══════════════════════════════════════════════════════════════════════ -->
  <script>

    /* ───────────────────────────────────────────────────────────────────────
       PROFILE  —  your personal information
       ─────────────────────────────────────────────────────────────────────── */
    const PROFILE = {
      name:       "enginyears",
      tagline:    "Electronics · DIY · Maker",
      bio:        "Building things that blink, beep, and connect. ESP32, Raspberry Pi, Home Automation, Web Dashboards & more. Code is always in the GitHub repo linked below.",
      avatar:     "",             // URL to your profile picture (or leave blank for emoji default)
      avatarEmoji:"⚡",           // Shown if no avatar URL set

      // Social links — paste your full URLs
      instagram:  "https://instagram.com/enginyears",
      youtube:    "https://youtube.com/@enginyears",
      github:     "https://github.com/yourusername", // your profile, not a repo
    };

    /* ───────────────────────────────────────────────────────────────────────
       PROJECTS DATABASE — now lives in projects.csv (edit that file instead)
       This array starts empty and is populated at page-load by loadProjects().
       ─────────────────────────────────────────────────────────────────────── */
    let PROJECTS = [];


    /* ═══════════════════════════════════════════════════════════════════════
       ████  RENDER ENGINE  ████  — Do not edit below unless you know what
       you're doing. All visual output is generated from the data above.
       ═══════════════════════════════════════════════════════════════════════ */

    /* ── Referrer / source tracking ──────────────────────────────────────── */
    (function trackSource() {
      const params   = new URLSearchParams(window.location.search);
      const ref      = params.get("ref") || params.get("utm_source") || "";
      const referrer = document.referrer || "";

      let source = "direct";
      if (ref)                                source = ref.toLowerCase();
      else if (referrer.includes("instagram")) source = "instagram";
      else if (referrer.includes("youtube"))   source = "youtube";
      else if (referrer.includes("github"))    source = "github";
      else if (referrer)                       source = "other";

      /* Store visit in localStorage for your own offline review
         To view: open DevTools → Application → Local Storage → visits_log */
      try {
        const log = JSON.parse(localStorage.getItem("visits_log") || "[]");
        log.push({ ts: new Date().toISOString(), source, referrer });
        if (log.length > 500) log.splice(0, log.length - 500); // cap at 500
        localStorage.setItem("visits_log", JSON.stringify(log));
      } catch(e) {}

      /* Fire a GoatCounter custom event for the traffic source.
         This gives you a "source" breakdown inside your GoatCounter dashboard. */
      window._gc_source = source;
      window.addEventListener("load", () => {
        if (typeof window.goatcounter !== "undefined") {
          window.goatcounter.count({ path: "source/" + source, title: "Source: " + source, event: true });
        }
      });
    })();

    /* ── Visitor label (nav top-right) ───────────────────────────────────── */
    function updateVisitorLabel() {
      try {
        const log  = JSON.parse(localStorage.getItem("visits_log") || "[]");
        const seen = JSON.parse(localStorage.getItem("seen_before") || "false");
        if (!seen) localStorage.setItem("seen_before", "true");
        document.getElementById("visitor-label").textContent =
          seen ? "returning visitor" : "new visitor";
      } catch(e) {
        document.getElementById("visitor-label").textContent = "online";
      }
    }

    /* ── Link-click GoatCounter events ──────────────────────────────────── */
    function trackLinkClick(projectId, platform) {
      if (typeof window.goatcounter !== "undefined") {
        window.goatcounter.count({
          path:  "click/" + projectId + "/" + platform,
          title: "Click: " + projectId + " → " + platform,
          event: true,
        });
      }
    }

    /* ── Utility helpers ─────────────────────────────────────────────────── */
    const isNew = date => (Date.now() - new Date(date)) < 30 * 24 * 60 * 60 * 1000;
    const fmt   = n    => n >= 1000 ? (n / 1000).toFixed(1) + "k" : n;
    const fmtDate = d  => new Date(d).toLocaleDateString("en-IN", { year:"numeric", month:"short", day:"numeric" });

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2000);
    }

    /* ── SVG icons ───────────────────────────────────────────────────────── */
    const ICONS = {
      instagram: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>`,
      youtube:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><polygon points="10 15 15 12 10 9"/></svg>`,
      github:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>`,
      reel:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>`,
      heart:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
      eye:       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
      msg:       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
      copy:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`,
    };

    /* ── Render Hero ──────────────────────────────────────────────────────── */
    function renderHero() {
      // Avatar
      const slot = document.getElementById("avatar-slot");
      slot.innerHTML = `
        <div class="avatar-wrap">
          <div class="avatar-hex">
            ${PROFILE.avatar
              ? `<img src="${PROFILE.avatar}" alt="${PROFILE.name}" />`
              : `<div class="avatar-placeholder">${PROFILE.avatarEmoji}</div>`}
          </div>
        </div>`;

      document.getElementById("hero-tagline").textContent = PROFILE.tagline;
      document.getElementById("hero-name").innerHTML =
        `${PROFILE.name}<span class="cursor"></span>`;
      document.getElementById("hero-bio").textContent = PROFILE.bio;

      const links = [
        { href: PROFILE.instagram, icon: ICONS.instagram, label: "Instagram", cls: "insta",  platform: "instagram" },
        { href: PROFILE.youtube,   icon: ICONS.youtube,   label: "YouTube",   cls: "yt",     platform: "youtube"   },
        { href: PROFILE.github,    icon: ICONS.github,    label: "GitHub",    cls: "gh",     platform: "github"    },
      ];

      document.getElementById("social-row").innerHTML = links.map(l => `
        <a class="social-btn ${l.cls}"
           href="${l.href}" target="_blank" rel="noopener"
           onclick="trackLinkClick('profile','${l.platform}')">
          ${l.icon} ${l.label}
        </a>`).join("");

      // Footer
      document.getElementById("footer-name").textContent = PROFILE.name;
      document.getElementById("footer-name").href = PROFILE.github;
      document.getElementById("footer-gh").href = PROFILE.github;
      document.getElementById("footer-right").textContent = "Analytics: GoatCounter";
    }

    /* ── Render Stats Strip ───────────────────────────────────────────────── */
    function renderStats() {
      const totalLikes  = PROJECTS.reduce((s,p) => s + (p.stats?.likes    || 0), 0);
      const totalViews  = PROJECTS.reduce((s,p) => s + (p.stats?.views    || 0), 0);
      const categories  = [...new Set(PROJECTS.flatMap(p => p.tags))].length;

      const cells = [
        { value: PROJECTS.length,      label: "Projects" },
        { value: fmt(totalViews),      label: "Total Views" },
        { value: fmt(totalLikes),      label: "Total Likes" },
        { value: categories,           label: "Categories" },
      ];

      document.getElementById("stats-strip").innerHTML =
        cells.map(c => `
          <div class="stat-cell">
            <div class="stat-value">${c.value}</div>
            <div class="stat-label">${c.label}</div>
          </div>`).join("");
    }

    /* ── Collect all unique tags ──────────────────────────────────────────── */
    function allTags() {
      return ["All", ...new Set(PROJECTS.flatMap(p => p.tags))];
    }

    /* ── Render Filters ────────────────────────────────────────────────────── */
    let activeFilter = "All";
    function renderFilters() {
      document.getElementById("filter-row").innerHTML = allTags().map(tag => `
        <button class="filter-btn ${tag === activeFilter ? "active" : ""}"
                onclick="setFilter('${tag}')">${tag}</button>`).join("");
    }
    function setFilter(tag) {
      activeFilter = tag;
      renderFilters();
      renderCards();
    }

    /* ── Render Cards ────────────────────────────────────────────────────── */
    function renderCards() {
      const query = document.getElementById("search-input").value.toLowerCase().trim();

      let list = [...PROJECTS].sort((a,b) => new Date(b.date) - new Date(a.date));

      if (activeFilter !== "All") {
        list = list.filter(p => p.tags.includes(activeFilter));
      }
      if (query) {
        list = list.filter(p =>
          p.title.toLowerCase().includes(query) ||
          p.description.toLowerCase().includes(query) ||
          p.tags.some(t => t.toLowerCase().includes(query)) ||
          (p.components||[]).some(c => c.toLowerCase().includes(query))
        );
      }

      const grid = document.getElementById("projects-grid");
      if (!list.length) {
        grid.innerHTML = `<div class="empty-state"><span>🔍</span>No projects match "${query || activeFilter}"</div>`;
        return;
      }

      grid.innerHTML = list.map(p => buildCard(p)).join("");
    }

    function buildCard(p) {
      const { id, title, description, thumbnail, thumbEmoji, tags, difficulty, date,
              featured, stats, links, components, notes } = p;

      const diffMap = { beginner:"beginner", intermediate:"intermediate", advanced:"advanced" };
      const diffLabel = { beginner:"Beginner", intermediate:"Intermediate", advanced:"Advanced" };

      const hasTrigger = isNew(date) || featured;
      const badges = [
        featured ? `<span class="badge badge-featured">★ Featured</span>` : "",
        isNew(date) ? `<span class="badge badge-new">New</span>` : "",
      ].filter(Boolean).join("");

      const thumbHTML = thumbnail
        ? `<img src="${thumbnail}" alt="${title}" loading="lazy" />`
        : `<div class="thumb-placeholder">${thumbEmoji || "🔧"}</div>`;

      const statsRow = `
        <div class="thumb-stats">
          <span class="thumb-stat">${ICONS.eye} ${fmt(stats?.views || 0)}</span>
          <span class="thumb-stat">${ICONS.heart} ${fmt(stats?.likes || 0)}</span>
          <span class="thumb-stat">${ICONS.msg} ${fmt(stats?.comments || 0)}</span>
        </div>`;

      const tagsHTML = tags.map(t => `<span class="tag">${t}</span>`).join("");

      const chipsHTML = (components||[]).length
        ? `<div class="components-row">${components.map(c => `<span class="component-chip">${c}</span>`).join("")}</div>`
        : "";

      const actionBtn = (href, icon, label, cls, platform) => `
        <a class="action-btn ${cls} ${href ? "" : "disabled"}"
           ${href ? `href="${href}" target="_blank" rel="noopener"` : ""}
           onclick="${href ? `trackLinkClick('${id}','${platform}')` : ""}">
          ${icon}
          <span>${label}</span>
        </a>`;

      return `
        <div class="project-card ${featured ? "featured" : ""} reveal">
          <div class="card-thumb">
            ${thumbHTML}
            <div class="card-badges">${badges}</div>
            ${difficulty ? `<div class="diff-badge diff-${diffMap[difficulty]}">${diffLabel[difficulty]}</div>` : ""}
            ${statsRow}
          </div>
          <div style="display:flex;flex-direction:column;flex:1;">
            <div class="card-body">
              <div class="card-tags">${tagsHTML}</div>
              <div class="card-title">${title}</div>
              <div class="card-desc">${description}${notes ? `<br/><em style="color:var(--dim)">${notes}</em>` : ""}</div>
              ${chipsHTML}
              <div class="card-date">Published ${fmtDate(date)}</div>
            </div>
            <div class="card-actions">
              ${actionBtn(links?.instagram, ICONS.reel,      "Reel",   "insta", "instagram")}
              ${actionBtn(links?.youtube,   ICONS.youtube,   "Shorts", "yt",    "youtube")}
              ${actionBtn(links?.github,    ICONS.github,    "Code",   "gh",    "github")}
            </div>
          </div>
        </div>`;
    }

    /* ── Scroll reveal ───────────────────────────────────────────────────── */
    function initReveal() {
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); } });
      }, { threshold: 0.08 });
      document.querySelectorAll(".reveal").forEach(el => obs.observe(el));
    }

    /* ── CSV → PROJECTS loader ───────────────────────────────────────────
       Fetches projects.csv (must be in the same folder as index.html),
       parses it with PapaParse, and maps each flat CSV row back into the
       nested object shape that all the render functions already expect.

       Multi-value fields (tags, components) are pipe-separated in the CSV
       e.g.  "Raspberry Pi|React|Web"  → ["Raspberry Pi","React","Web"]
    ─────────────────────────────────────────────────────────────────────── */
    function loadProjects() {
      return new Promise((resolve, reject) => {
        fetch("projects.csv")
          .then(res => {
            if (!res.ok) throw new Error("Could not fetch projects.csv — status " + res.status);
            return res.text();
          })
          .then(text => {
            Papa.parse(text, {
              header:         true,   // first row becomes field names
              skipEmptyLines: true,
              complete: results => {
                resolve(results.data.map(row => ({
                  id:          row.id        || "",
                  title:       row.title     || "",
                  description: row.description || "",
                  thumbnail:   row.thumbnail || "",
                  thumbEmoji:  row.thumbEmoji || "🔧",

                  // Pipe-separated strings become proper arrays
                  tags:        row.tags       ? row.tags.split("|").map(s => s.trim()).filter(Boolean)       : [],
                  components:  row.components ? row.components.split("|").map(s => s.trim()).filter(Boolean) : [],

                  difficulty:  row.difficulty || "",
                  date:        row.date       || "2000-01-01",
                  featured:    row.featured === "true",   // CSV stores "true"/"false" as text
                  notes:       row.notes      || "",

                  // Flat CSV columns reassembled into nested objects
                  stats: {
                    likes:    parseInt(row.likes)    || 0,
                    views:    parseInt(row.views)    || 0,
                    comments: parseInt(row.comments) || 0,
                  },
                  links: {
                    instagram: row.instagram || "",
                    youtube:   row.youtube   || "",
                    github:    row.github    || "",
                  },
                })));
              },
              error: err => reject(err),
            });
          })
          .catch(reject);
      });
    }

    /* ── Boot (async so we can await the CSV fetch) ───────────────────── */
    document.addEventListener("DOMContentLoaded", async () => {
      updateVisitorLabel();
      renderHero();

      // Show a loading state in the grid while the CSV is being fetched
      document.getElementById("projects-grid").innerHTML =
        `<div class="empty-state"><span>⚡</span>Loading projects...</div>`;

      try {
        PROJECTS = await loadProjects();
      } catch (err) {
        document.getElementById("projects-grid").innerHTML =
          `<div class="empty-state"><span>⚠️</span>
           Could not load <code>projects.csv</code>.<br>
           <small style="color:var(--dim)">
             If you're opening this file directly from disk, run a local server instead:<br>
             <code>python -m http.server</code> then visit localhost:8000
           </small></div>`;
        console.error("projects.csv load error:", err);
        return;
      }

      renderStats();
      renderFilters();
      renderCards();
      setTimeout(initReveal, 50);

      // Search live filtering — same as before
      document.getElementById("search-input").addEventListener("input", () => {
        renderCards();
        setTimeout(initReveal, 50);
      });
    });

  </script>
</body>
